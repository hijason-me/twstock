{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twstock-grafana
  namespace: {{ .Values.namespace }}
  labels:
    app: twstock-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twstock-grafana
  template:
    metadata:
      labels:
        app: twstock-grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twstock-secrets
                  key: TWSTOCK_GRAFANA_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/01-macro.json"
            # 傳給 datasource provisioning 使用 ${POSTGRES_PASSWORD}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twstock-secrets
                  key: TWSTOCK_DB_PASSWORD
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          resources: {{ .Values.grafana.resources | toYaml | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: twstock-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: twstock-grafana-provider
        - name: dashboards
          configMap:
            name: twstock-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: twstock-grafana
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.grafana.service.type }}
  selector:
    app: twstock-grafana
  ports:
    - port: 3000
      targetPort: 3000
      {{- if eq .Values.grafana.service.type "NodePort" }}
      nodePort: {{ .Values.grafana.service.nodePort }}
      {{- end }}
{{- end }}
