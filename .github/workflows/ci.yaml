name: CI — Build & Push to GHCR

on:
  push:
    branches: [main]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER:    ${{ github.repository_owner }}

jobs:
  # ------------------------------------------------------------------ #
  # Build matrix: one job per service image                             #
  # ------------------------------------------------------------------ #
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    api
            context:    services/api
            image:      twstock-api
          - service:    collector
            context:    services/collector
            image:      twstock-collector
          - service:    analyzer
            context:    services/analyzer
            image:      twstock-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Docker metadata (tags + labels) ──────────────────────────── #
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            # Branch push  → branch name  (e.g. main)
            type=ref,event=branch
            # PR            → pr-<number>
            type=ref,event=pr
            # Semver tag    → v1.2.3 / 1.2.3 / 1.2 / 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Always tag latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Short SHA for traceability
            type=sha,prefix=sha-,format=short

      # ── QEMU + Buildx for multi-arch (optional, arm64 support) ───── #
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to GHCR (skip on PR from forks) ─────────────── #
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build (and push on non-PR runs) ──────────────────────────── #
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          platforms:  linux/amd64,linux/arm64
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  # ------------------------------------------------------------------ #
  # Helm lint — validate chart after images are verified               #
  # ------------------------------------------------------------------ #
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/twstock --strict

  # ------------------------------------------------------------------ #
  # Writeback — update helm/twstock/values.yaml with the deployed tag  #
  # ArgoCD detects this git change and auto-syncs (no Image Updater    #
  # needed). Uses [skip ci] to prevent infinite loop.                  #
  # ------------------------------------------------------------------ #
  update-helm-tag:
    name: Writeback image tag to values.yaml
    runs-on: ubuntu-latest
    needs: helm-lint
    # Only run on direct pushes (not PRs); tags use semver, branches use SHA
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN; needs "Read and write permissions" in
          # Settings → Actions → General → Workflow permissions
          token: ${{ secrets.GITHUB_TOKEN }}
          ref:   ${{ github.ref }}

      - name: Compute new tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # v1.2.3  →  1.2.3  (strip leading 'v')
            NEW_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          else
            # main push  →  sha-abc1234
            NEW_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          fi
          echo "value=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Patch image.tag in values.yaml
        run: |
          NEW_TAG="${{ steps.tag.outputs.value }}"
          sed -i "s/^  tag:.*$/  tag: \"${NEW_TAG}\"/" helm/twstock/values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/twstock/values.yaml
          # Skip commit if nothing changed (idempotent)
          git diff --cached --quiet && echo "No tag change, skipping commit." && exit 0
          git commit -m "chore: bump image.tag to ${{ steps.tag.outputs.value }} [skip ci]"
          git push
