apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: twstock
  namespace: argocd
  annotations:
    # 透過 ArgoCD UI → Application → Parameters 覆蓋下方 parameters
    # 或使用 sealed-secrets / external-secrets 注入，不要將 token 直接提交到 Git
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://github.com/hijason-me/twstock
    targetRevision: HEAD
    path: helm/twstock
    helm:
      valueFiles:
        - values.yaml
      # ── 可在 ArgoCD UI → App Details → Parameters 覆蓋 ──────────────
      parameters:
        # ── Image ──────────────────────────────────────────────────────
        - name: image.tag
          value: latest

        # ── Database password (建議改用 sealed-secrets) ────────────────
        - name: postgresql.credentials.password
          value: ""          # ← 在 ArgoCD UI 填入或透過 SealedSecret 注入

        # ── External API tokens ────────────────────────────────────────
        - name: secrets.finmindApiToken
          value: ""          # ← FinMind token (free: finmindtrade.com)

        - name: secrets.fredApiKey
          value: ""          # ← FRED API key (free: fred.stlouisfed.org)

        - name: secrets.telegramBotToken
          value: ""          # ← Telegram bot token (Phase 2 告警)

        - name: secrets.telegramChatId
          value: ""          # ← Telegram chat ID (Phase 2 告警)

        # ── Data source selection ──────────────────────────────────────
        - name: config.revenueSource
          value: "twse"      # twse (bulk, 免費) | finmind (per-ticker, 需 token)

        - name: config.financialsSource
          value: "twse"      # twse (bulk, 免費) | finmind (per-ticker, 需 token)

        - name: config.holdersSource
          value: "tdcc"      # tdcc (bulk, 免費) | finmind (per-ticker, 需付費方案)

        # ── FinMind 限流設定 ────────────────────────────────────────────
        - name: config.finmindTickersLimit
          value: "200"       # free tier: 200; paid: 0 = 無限制

        - name: config.finmindRequestDelay
          value: "10.0"      # 秒/request，10s ≈ 360 req/hr (safe for free tier)

  destination:
    server: https://kubernetes.default.svc
    namespace: twstock

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
