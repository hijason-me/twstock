{{- if .Values.grafana.enabled }}
---
# ── Datasource 自動佈建 ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: twstock-grafana-datasources
  namespace: {{ .Values.namespace }}
data:
  postgres.yaml: |
    apiVersion: 1
    datasources:
      - name: TimescaleDB
        type: postgres
        uid: timescaledb
        url: twstock-postgresql.{{ .Values.namespace }}.svc.cluster.local:5432
        database: {{ .Values.postgresql.credentials.database }}
        user: {{ .Values.postgresql.credentials.username }}
        secureJsonData:
          password: ${POSTGRES_PASSWORD}
        jsonData:
          sslmode: disable
          postgresVersion: 1600
          timescaledb: true
        isDefault: true
        editable: true
---
# ── Dashboard Provider ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: twstock-grafana-provider
  namespace: {{ .Values.namespace }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: TWStock
        orgId: 1
        folder: TWStock
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
# ── Dashboard JSON 檔案 ───────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: twstock-grafana-dashboards
  namespace: {{ .Values.namespace }}
data:
  01-macro.json: |
{{ .Files.Get "files/grafana/dashboards/01-macro.json" | indent 4 }}
  02-stock.json: |
{{ .Files.Get "files/grafana/dashboards/02-stock.json" | indent 4 }}
  03-fundamentals.json: |
{{ .Files.Get "files/grafana/dashboards/03-fundamentals.json" | indent 4 }}
{{- end }}
