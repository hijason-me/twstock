{{- $fullName := include "twstock.fullname" . }}
{{- $image    := include "twstock.collectorImage" . }}
{{- $labels   := include "twstock.labels" . }}

{{/* ── daily_prices ── */}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}-collect-daily-prices
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  schedule: {{ .Values.collector.dailyPrices.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "twstock.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: collector
        spec:
          restartPolicy: OnFailure
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: collector
              image: {{ $image }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: ["--job", {{ .Values.collector.dailyPrices.job | quote }}]
              envFrom:
                - configMapRef:
                    name: {{ $fullName }}-config
                - secretRef:
                    name: {{ $fullName }}-secrets
              resources:
                {{- toYaml .Values.collector.dailyPrices.resources | nindent 16 }}
---
