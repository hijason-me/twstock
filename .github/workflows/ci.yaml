name: CI

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/twstock

jobs:
  # ── Lint & Test ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv pip install --system -e .
      - run: python -m pytest tests/ -v --tb=short
        continue-on-error: true   # non-blocking until tests are written

  # ── Helm lint ───────────────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint helm/twstock/

  # ── Docker build & push ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [test, helm-lint]
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Writeback SHA tag to values.yaml ──────────────────
      - name: Compute tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            echo "value=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Patch values.yaml
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          sed -i "s/^  tag:.*$/  tag: \"${IMAGE_TAG}\"/" helm/twstock/values.yaml

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/twstock/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump image.tag to ${IMAGE_TAG} [skip ci]"
          git push
