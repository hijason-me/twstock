apiVersion: v1
kind: Secret
metadata:
  name: twstock-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  TWSTOCK_DB_PASSWORD:          {{ .Values.postgresql.credentials.password | quote }}
  TWSTOCK_DATABASE_URL:         "postgresql+asyncpg://{{ .Values.postgresql.credentials.username }}:{{ .Values.postgresql.credentials.password }}@twstock-postgresql.{{ .Values.namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.credentials.database }}"
  TWSTOCK_FINMIND_API_TOKEN:    {{ .Values.secrets.finmindApiToken | quote }}
  TWSTOCK_FRED_API_KEY:         {{ .Values.secrets.fredApiKey | quote }}
  TWSTOCK_TELEGRAM_BOT_TOKEN:   {{ .Values.secrets.telegramBotToken | quote }}
  TWSTOCK_TELEGRAM_CHAT_ID:     {{ .Values.secrets.telegramChatId | quote }}
