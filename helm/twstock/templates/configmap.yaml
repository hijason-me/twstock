apiVersion: v1
kind: ConfigMap
metadata:
  name: twstock-config
  namespace: {{ .Values.namespace }}
data:
  TWSTOCK_REQUEST_DELAY:             {{ .Values.requestDelay | quote }}
  TWSTOCK_LOG_LEVEL:                 {{ .Values.logLevel | quote }}
  # Data source selection
  TWSTOCK_REVENUE_SOURCE:            {{ .Values.config.revenueSource | quote }}
  TWSTOCK_FINANCIALS_SOURCE:         {{ .Values.config.financialsSource | quote }}
  TWSTOCK_HOLDERS_SOURCE:            {{ .Values.config.holdersSource | quote }}
  # FinMind throttle
  TWSTOCK_FINMIND_TICKERS_LIMIT:     {{ .Values.config.finmindTickersLimit | quote }}
  TWSTOCK_FINMIND_REQUEST_DELAY:     {{ .Values.config.finmindRequestDelay | quote }}
