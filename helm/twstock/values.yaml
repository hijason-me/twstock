# ============================================================
# TWStock Helm Chart Values
# ============================================================

image:
  repository: ghcr.io/hijason-me/twstock
  tag: latest
  pullPolicy: IfNotPresent

# ── PostgreSQL (TimescaleDB) ──────────────────────────────────
postgresql:
  image: timescale/timescaledb:latest-pg16
  storage: 50Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }
  credentials:
    database: twstock
    username: twstock
    # password is set via secret; override with --set postgresql.credentials.password=
    password: ""

# ── Collector CronJobs ────────────────────────────────────────
collectors:
  # 每日盤後 18:30 TST = 10:30 UTC，週一至週五
  dailyPrices:
    schedule: "30 10 * * 1-5"
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

  # 三大法人 + 期貨 + 融資融券（稍晚拉取，確保資料到位）
  dailyInstitutional:
    schedule: "45 10 * * 1-5"
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

  # 總經指標：每日 02:00 UTC
  macroIndicators:
    schedule: "0 2 * * *"
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 300m, memory: 512Mi }

  # 月營收：每月 10~20 日的 12:00 UTC
  monthlyRevenue:
    schedule: "0 12 10-20 * *"
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  # 季報：每週一 13:00 UTC
  quarterlyFinancials:
    schedule: "0 13 * * 1"
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  # 千張大戶：每週一 14:00 UTC
  weeklyMajorHolders:
    schedule: "0 14 * * 1"
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: "1",  memory: 1Gi }

# ── External API secrets (set via --set or sealed-secrets) ───
secrets:
  finmindApiToken: ""
  fredApiKey: ""
  telegramBotToken: ""
  telegramChatId: ""

# ── General ───────────────────────────────────────────────────
requestDelay: "1.0"
logLevel: INFO
namespace: twstock
