{{- $image := printf "%s:%s" .Values.image.repository .Values.image.tag }}
{{- $ns    := .Values.namespace }}
{{- $jobs  := dict
      "daily-prices"          (dict "job" "daily_prices"         "schedule" .Values.collectors.dailyPrices.schedule         "res" .Values.collectors.dailyPrices.resources)
      "daily-institutional"   (dict "job" "daily_institutional"  "schedule" .Values.collectors.dailyInstitutional.schedule  "res" .Values.collectors.dailyInstitutional.resources)
      "macro-indicators"      (dict "job" "macro_indicators"     "schedule" .Values.collectors.macroIndicators.schedule     "res" .Values.collectors.macroIndicators.resources)
      "monthly-revenue"       (dict "job" "monthly_revenue"      "schedule" .Values.collectors.monthlyRevenue.schedule      "res" .Values.collectors.monthlyRevenue.resources)
      "quarterly-financials"  (dict "job" "quarterly_financials" "schedule" .Values.collectors.quarterlyFinancials.schedule "res" .Values.collectors.quarterlyFinancials.resources)
      "weekly-major-holders"  (dict "job" "weekly_major_holders" "schedule" .Values.collectors.weeklyMajorHolders.schedule  "res" .Values.collectors.weeklyMajorHolders.resources)
}}
{{- range $name, $cfg := $jobs }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: twstock-collector-{{ $name }}
  namespace: {{ $ns }}
spec:
  schedule: {{ $cfg.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: collector
              image: {{ $image }}
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              args: ["--job", {{ $cfg.job | quote }}]
              envFrom:
                - configMapRef:  { name: twstock-config }
                - secretRef:     { name: twstock-secrets }
              resources:
                requests: {{ $cfg.res.requests | toYaml | nindent 18 }}
                limits:   {{ $cfg.res.limits   | toYaml | nindent 18 }}
{{- end }}
