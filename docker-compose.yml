# ============================================================
# TWStock — Local Development
# ============================================================
# Quick start:
#   docker compose up -d postgres
#   docker compose run --rm twstock --job macro_indicators
#
# Create .env for API keys:
#   TWSTOCK_FINMIND_API_TOKEN=<token>
#   TWSTOCK_FRED_API_KEY=<key>

x-env: &env
  TWSTOCK_DATABASE_URL: postgresql+asyncpg://twstock:twstock@postgres:5432/twstock
  TWSTOCK_LOG_LEVEL: INFO
  TWSTOCK_FINMIND_API_TOKEN: ${TWSTOCK_FINMIND_API_TOKEN:-}
  TWSTOCK_FRED_API_KEY: ${TWSTOCK_FRED_API_KEY:-}

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: twstock
      POSTGRES_USER: twstock
      POSTGRES_PASSWORD: twstock
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "twstock"]
      interval: 10s
      timeout: 5s
      retries: 5

  twstock:
    build: .
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
    # Override per job:
    #   docker compose run --rm twstock --job daily_prices
    command: ["--job", "macro_indicators"]
    profiles: ["jobs"]

volumes:
  postgres_data:
