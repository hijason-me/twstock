apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: twstock-postgresql
  namespace: {{ .Values.namespace }}
spec:
  serviceName: twstock-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: twstock-postgresql
  template:
    metadata:
      labels:
        app: twstock-postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.credentials.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.credentials.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: twstock-secrets
                  key: TWSTOCK_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          resources: {{ .Values.postgresql.resources | toYaml | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.credentials.username | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.credentials.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-sql
          configMap:
            name: twstock-init-sql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: twstock-postgresql
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  selector:
    app: twstock-postgresql
  ports:
    - port: 5432
